  <body>
    <main class="app">
      <h1>Rock Paper Scissors</h1>

      <div class="game-card">
        <div class="choices">
          <div class="choice" id="rock">
            <img src="images/rock.png" alt="Rock" />
          </div>
          <div class="choice" id="paper">
            <img src="images/paper.png" alt="Paper" />
          </div>
          <div class="choice" id="scissors">
            <img src="images/scissors.png" alt="Scissors" />
          </div>
        </div>

        <div class="computer-choice">
          <p id="comp-label" class="hide">Computer Chose</p>
          <div class="choice computer hide" id="computer-box">
            <img id="computer-img" alt="Computer Choice" />
          </div>
        </div>

        <div class="scoreBoard">
          <div class="score">
            <p id="user-score">0</p>
            <span>You</span>
          </div>
          <div class="score">
            <p id="comp-score">0</p>
            <span>Computer</span>
          </div>
        </div>

        <div class="msg-container">
          <p id="messege">Play Your Move</p>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
